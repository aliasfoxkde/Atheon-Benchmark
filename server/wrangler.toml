name = "atheon-benchmark-api"
compatibility_date = "2026-06-19"
compatibility_flags = ["nodejs_compat"]

main = "src/index.ts"
workers_dev = true

# Environment variables
[vars]
ENVIRONMENT = "development"
APP_NAME = "Atheon Benchmark API"
APP_VERSION = "1.0.0"

# Production environment
[env.production]
name = "atheon-benchmark-api-production"

[env.production.vars]
ENVIRONMENT = "production"

# Staging environment
[env.staging]
name = "atheon-benchmark-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "atheon-benchmark-db"
database_id = "local"

# R2 Storage binding
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "atheon-benchmark-storage"

# KV Storage binding
[[kv_namespaces]]
binding = "CACHE"
id = "local"
preview_id = "local"

# Analytics configuration
[analytics]
enabled = true