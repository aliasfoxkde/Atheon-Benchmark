name: Bug Report
description: Create a bug report to help us improve
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for taking the time to report a bug!

        Please fill out this form completely to help us understand and reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug here...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        Steps to reproduce the behavior:
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear description of what you expected to happen.
      placeholder: Expected behavior...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear description of what actually happened.
      placeholder: Actual behavior...
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: |
        - OS: [e.g., macOS 14.0, Ubuntu 22.04, Windows 11]
        - Browser: [e.g., Chrome 120, Firefox 121, Safari 17]
        - Dashboard version: [e.g., 1.0.0 - find in footer]
        - Node version: [if applicable]
      placeholder: "OS: macOS 14.0, Browser: Chrome 120, Dashboard: 1.0.0"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Paste any relevant console logs, error messages, or stack traces here.
        **Remove any sensitive information before pasting!**
      placeholder: |
        ```
        Error: Something went wrong
          at Module.run (module.js:123:45)
          ...
        ```
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
      placeholder: |
        ![Description](url)
        ![Expected](url)
        ![Actual](url)
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
      placeholder: Any other details...
    validations:
      required: false

  - type: checkboxes
    id: requirements
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched the existing issues to ensure this bug hasn't been reported
          required: true
        - label: I have included steps to reproduce the bug
          required: true
        - label: I have included my environment details
          required: false
        - label: I have attached relevant logs (no sensitive data)
          required: false
