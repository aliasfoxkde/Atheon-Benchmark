name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for suggesting a feature!

        Please fill out this form to help us evaluate and prioritize your request.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: |
        Describe the problem you are trying to solve or the motivation behind this feature request.
        Why is this feature important to you?
      placeholder: |
        I want to be able to...
        This would help because...
        The current workaround is...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Desired Solution
      description: |
        Describe the solution you'd like.
        What should this feature do or look like?
      placeholder: |
        The feature should...
        When I do X, it should Y...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: |
        Describe any alternative solutions or workarounds you've considered.
        What are the trade-offs?
      placeholder: |
        Alternative 1: ...
        Trade-off: ...
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope & Impact
      description: |
        Who would benefit from this feature?
        How frequently would it be used?
        Does it affect other parts of the system?
      placeholder: |
        Users affected: ...
        Use frequency: ...
        Side effects: ...
    validations:
      required: false

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Examples
      description: |
        If available, provide mockups, screenshots, or examples of how this feature should work.
      placeholder: |
        ![Mockup](url)
        Example: ...
    validations:
      required: false

  - type: textarea
    id: requirements
    attributes:
      label: Detailed Requirements
      description: |
        List specific functional requirements for this feature.
        Be as detailed as possible.
      placeholder: |
        - Requirement 1: ...
        - Requirement 2: ...
        - Requirement 3: ...
    validations:
      required: false

  - type: input
    id: component
    attributes:
      label: Affected Component
      description: Which part of the system would this feature affect?
      placeholder: "e.g., dashboard, server, runner, SDK"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: This feature request is not already addressed by existing issues
          required: true
        - label: I understand this is a wishlist and not a guarantee of implementation
          required: true
        - label: I am available to provide additional context if needed
          required: false
