name: Automated Benchmarks

on:
  schedule:
    # Run benchmarks daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Benchmark scenario to run'
        required: false
        default: 'comprehensive-comparison'
        type: choice
        options:
          - vanilla-baseline
          - mcp-enabled
          - atheon-integrated
          - comprehensive-comparison

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build benchmark runner
        run: |
          cd runner
          go build -o atheon-benchmark main.go

      - name: Run benchmarks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          cd runner
          ./atheon-benchmark run \
            --test-cases=10 \
            --upload=true \
            --output="../dashboard/results/benchmark-$(date +%Y%m%d-%H%M%S).json"

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ github.run_id }}
          path: dashboard/results/*.json
          retention-days: 30

  compare-results:
    needs: run-benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download previous results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: current-results

      - name: Compare results
        run: |
          echo "Comparing benchmark results..."
          if [ -d "current-results" ]; then
            echo "Results available for analysis"
          fi

      - name: Create issue if regression detected
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.name,
              title: 'Performance Regression Detected',
              body: 'Automated benchmarks have detected a performance regression. Please investigate the benchmark results.',
              labels: ['performance', 'regression', 'automated']
            })

  notify-results:
    needs: [run-benchmark, compare-results]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "Benchmark completed. Results available in artifacts."
