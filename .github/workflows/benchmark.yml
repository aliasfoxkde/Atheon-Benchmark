name: Automated Benchmarks

on:
  schedule:
    # Run benchmarks daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Benchmark scenario to run'
        required: false
        default: 'comprehensive-comparison'
        type: choice
        options:
          - vanilla-baseline
          - mcp-enabled
          - atheon-integrated
          - comprehensive-comparison

jobs:
  run-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: |
          cd dashboard
          npm ci

      - name: Run benchmarks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd dashboard
          npm run benchmark -- --scenario="${{ github.event.inputs.scenario || 'comprehensive-comparison' }}"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: dashboard/results/*.json
          retention-days: 30

      - name: Generate report
        run: |
          cd dashboard
          npm run generate-report

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: dashboard/reports/*.md
          retention-days: 90

  compare-results:
    needs: run-benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download previous results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: previous-results

      - name: Download current results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: current-results

      - name: Compare results
        run: |
          echo "Comparing benchmark results..."
          # Add comparison logic here

      - name: Create issue if regression detected
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.name,
              title: 'Performance Regression Detected',
              body: 'Automated benchmarks have detected a performance regression. Please investigate the benchmark results.',
              labels: ['performance', 'regression', 'automated']
            })

  notify-results:
    needs: [run-benchmark, compare-results]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "Benchmark completed. Results available in artifacts."
          # Add notification logic (Discord webhook, email, etc.)