name: Test Atheon Benchmark Dashboard

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'dashboard/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'dashboard/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint and type-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'dashboard/package-lock.json'

      - name: Install dependencies
        run: |
          cd dashboard
          npm ci

      - name: Run ESLint
        run: |
          cd dashboard
          npm run lint

      - name: TypeScript type check
        run: |
          cd dashboard
          npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    name: Run tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'dashboard/package-lock.json'

      - name: Install dependencies
        run: |
          cd dashboard
          npm ci

      - name: Run tests with coverage
        run: |
          cd dashboard
          npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./dashboard/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          verbose: true

  build-test:
    runs-on: ubuntu-latest
    name: Test build process

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'dashboard/package-lock.json'

      - name: Install dependencies
        run: |
          cd dashboard
          npm ci

      - name: Test build process
        run: |
          cd dashboard
          npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build output
        run: |
          cd dashboard
          if [ -d "out" ] && [ "$(ls -A out/)" ]; then
            echo "✅ Build output directory exists and is not empty"
            ls -la out/
          else
            echo "❌ Build output directory is missing or empty"
            exit 1
          fi

      - name: Verify static files
        run: |
          cd dashboard
          if [ -f "out/benchmark-results.json" ]; then
            echo "✅ Benchmark results file exists"
            size=$(du -h out/benchmark-results.json | cut -f1)
            echo "📊 Results file size: $size"
          else
            echo "❌ Benchmark results file not found"
            exit 1
          fi