name: Deploy Atheon Benchmark Dashboard

on:
  push:
    branches: [ main ]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      skip-build:
        description: 'Skip build step (use existing out/ directory)'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'dashboard/package-lock.json'

      - name: Install dependencies
        run: |
          cd dashboard
          npm ci

      - name: Run tests (if available)
        run: |
          cd dashboard
          npm test || echo "No tests configured yet"

      - name: Build application
        if: github.event.inputs.skip-build != 'true'
        run: |
          cd dashboard
          npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: atheon-benchmark-dashboard
          directory: dashboard/out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3.22.0'

      - name: Comment deployment status on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Dashboard deployed to Cloudflare Pages preview environment!'
            })

  test-deployment:
    runs-on: ubuntu-latest
    name: Test deployed site
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Test main site
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://atheon-benchmark-dashboard.pages.dev/)
          if [ $response -eq 200 ]; then
            echo "✅ Main site is accessible"
          else
            echo "❌ Main site returned HTTP $response"
            exit 1
          fi

      - name: Test results data
        run: |
          response=$(curl -s https://atheon-benchmark-dashboard.pages.dev/benchmark-results.json)
          if echo "$response" | jq -e '. | length >= 0' > /dev/null; then
            echo "✅ Results data is accessible and valid"
            count=$(echo "$response" | jq '. | length')
            echo "📊 Found $count benchmark results"
          else
            echo "❌ Results data is not valid"
            exit 1
          fi

      - name: Test metadata
        run: |
          response=$(curl -s https://atheon-benchmark-dashboard.pages.dev/benchmark-metadata.json)
          if echo "$response" | jq -e '.total_systems' > /dev/null; then
            echo "✅ Metadata is accessible and valid"
          else
            echo "❌ Metadata is not valid"
            exit 1
          fi