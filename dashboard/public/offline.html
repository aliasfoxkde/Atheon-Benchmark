<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Atheon Benchmark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e4e4e4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #fff; }
    p { color: #888; max-width: 400px; line-height: 1.6; }
    .retry-btn {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>The application is currently unavailable because you're not connected to the internet. Your cached benchmark data is still available.</p>
  <button class="retry-btn" onclick="window.location.reload()">Retry Connection</button>
  <script>
    // Auto-retry every 30 seconds
    setTimeout(() => window.location.reload(), 30000);
  </script>
</body>
</html>
