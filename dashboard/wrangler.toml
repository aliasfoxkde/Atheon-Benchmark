# Cloudflare Workers configuration for Atheon Benchmark Dashboard
name = "atheon-benchmark-dashboard"
compatibility_date = "2026-06-19"
compatibility_flags = ["nodejs_compat"]

# Main configuration
main = "workers/index.ts"
workers_dev = true

# Build configuration
[build]
command = "npm run build:workers"

# Environment variables
[vars]
ENVIRONMENT = "development"
APP_NAME = "Atheon Benchmark Dashboard"
APP_VERSION = "1.0.0"

# D1 Database binding (requires wrangler d1 create first)
[[d1_databases]]
binding = "DB"
database_name = "atheon-benchmark-db"
database_id = "${CLOUDFLARE_D1_DATABASE_ID}"  # Set via wrangler secret or environment

# R2 Storage binding (requires wrangler r2 object-store create first)
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "atheon-benchmark-storage"

# KV Storage binding (requires wrangler kv:namespace create first)
[[kv_namespaces]]
binding = "CACHE"
id = "${CLOUDFLARE_KV_NAMESPACE_ID}"

# Analytics configuration
[analytics]
enabled = true